version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/schema.sql"
    queries: "internal/store/queries"
    gen:
      go:
        package: "gen"
        out: "internal/store/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "timestamptz"
            go_type: "time.Time"
